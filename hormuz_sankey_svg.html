
<style>
body { margin:0; font-family:sans-serif; background:transparent; }
.btn { font-size:11px; padding:5px 13px; border-radius:20px; border:1px solid #aaa; background:transparent; color:#888; cursor:pointer; }
.btn.active { color:#fff; border-color:currentColor; }
#m0.active { background:#0F6E56; }
#m1.active { background:#BA7517; }
#m2.active { background:#A32D2D; }
.leg { display:flex; gap:12px; flex-wrap:wrap; padding:4px 8px 8px; }
.li { font-size:10px; color:#777; display:flex; align-items:center; gap:4px; }
.ls { display:inline-block; width:20px; height:5px; border-radius:2px; }
</style>

<div style="display:flex;gap:7px;padding:10px 8px 5px;flex-wrap:wrap">
  <button class="btn active" id="m0" onclick="show(0)">① Normal 2025</button>
  <button class="btn" id="m1" onclick="show(1)">② Hormuz blocked</button>
  <button class="btn" id="m2" onclick="show(2)">③ Both blocked</button>
</div>
<div class="leg">
  <span class="li"><span class="ls" style="background:#1D9E75"></span>Crude oil</span>
  <span class="li"><span class="ls" style="background:#378ADD"></span>LNG</span>
  <span class="li"><span class="ls" style="background:#E09020"></span>Pipeline bypass</span>
  <span class="li"><span class="ls" style="background:#8866CC"></span>Cape of Good Hope</span>
  <span class="li"><span class="ls" style="background:#CC3333"></span>Blocked</span>
</div>
<div id="wrap"></div>

<script>
const FLOW_COLORS = {
  oil:    "#1D9E75",
  lng:    "#378ADD",
  bypass: "#E09020",
  cape:   "#8866CC",
  block:  "#CC3333"
};

// Each mode: { title, flows[] }
// flow: { from, to, val, type, label }
// Columns fixed: 0=Producers 1=Chokepoint1 2=Chokepoint2/Route 3=Destinations
// Producers: SA=0, Iraq=1, UAE=2, Kuwait=3, Qatar=4, Iran=5
// Destinations: China=0, India=1, JapKor=2, Europe=3, USA=4, OtherAsia=5

const MODES = [
{
  title:"Both straits open · 2025 · Brent ~$72/bbl",
  titleColor:"#0F6E56",
  col1label:"Strait of Hormuz",
  col1color:"#0F6E56",
  col2label:"Bab el-Mandeb",
  col2color:"#0C447C",
  col3label:"",
  producers:["Saudi Arabia","Iraq","UAE","Kuwait","Qatar","Iran"],
  dests:["China","India","Japan/S.Korea","Europe","USA","Other Asia"],
  // [fromProd/dest, toCol, val, type, label]
  // prod→hormuz
  p2h:[
    [0,5.5,"oil","Saudi Arabia"],
    [1,3.4,"oil","Iraq"],
    [2,2.6,"oil","UAE"],
    [3,1.7,"oil","Kuwait"],
    [4,0.9,"oil","Qatar crude"],
    [4,1.2,"lng","Qatar LNG"],
    [5,1.5,"oil","Iran"],
  ],
  // hormuz→bab (suez-bound)
  h2b:[
    [4.5,"oil","crude via Suez"],
    [1.2,"lng","LNG via Suez"],
  ],
  // hormuz→dest direct (Indian Ocean)
  h2d:[
    [0,6.0,"oil","Hormuz → China"],
    [1,2.5,"oil","Hormuz → India"],
    [2,1.0,"oil","Hormuz → Japan/S.Korea"],
  ],
  // bab→dest
  b2d:[
    [2,1.2,"oil","Bab → Japan/S.Korea"],
    [3,2.8,"oil","Bab → Europe (oil)"],
    [3,1.2,"lng","Bab → Europe (LNG)"],
    [4,0.5,"oil","Bab → USA"],
  ]
},
{
  title:"Hormuz ~70% blocked · Mar 2026 · Brent ~$106/bbl",
  titleColor:"#BA7517",
  col1label:"Hormuz (BLOCKED)",
  col1color:"#8B0000",
  col2label:"Bab el-Mandeb\n(critical lifeline)",
  col2color:"#0F6E56",
  producers:["Saudi Arabia","Iraq","UAE","Kuwait","Qatar","Iran"],
  dests:["China","India","Japan/S.Korea","Europe","USA","Other Asia"],
  p2h:[
    [0,1.2,"oil","Saudi Arabia"],
    [1,0.5,"oil","Iraq"],
    [2,0.4,"oil","UAE"],
    [3,0.2,"oil","Kuwait"],
    [4,0.1,"lng","Qatar LNG"],
    [5,0.0,"block","Iran (BLOCKED)"],
  ],
  // pipelines bypass → feed Bab directly
  bypass2b:[
    [3.5,"bypass","Yanbu Pipeline (Saudi)"],
    [1.5,"bypass","Fujairah Pipeline (UAE)"],
  ],
  h2b:[
    [1.8,"oil","Hormuz remnant → Bab"],
  ],
  h2d:[
    [1,0.5,"oil","Hormuz → India (nearby)"],
  ],
  b2d:[
    [0,2.8,"bypass","Bab → China"],
    [1,1.6,"bypass","Bab → India"],
    [2,0.9,"oil","Bab → Japan/S.Korea"],
    [3,1.2,"bypass","Bab → Europe"],
    [3,0.05,"lng","Bab → Europe (LNG)"],
    [4,0.2,"oil","Bab → USA"],
  ]
},
{
  title:"⚠ BOTH BLOCKED · Double chokepoint · Brent est. $150–175/bbl",
  titleColor:"#CC3333",
  col1label:"Hormuz (BLOCKED)",
  col1color:"#8B0000",
  col2label:"Bab el-Mandeb\n(BLOCKED)",
  col2color:"#8B0000",
  col3label:"Cape of Good Hope\n(+12–15 days)",
  producers:["Saudi Arabia","Iraq","UAE","Kuwait","Qatar","Iran"],
  dests:["China","India","Japan/S.Korea","Europe","USA","Other Asia"],
  p2h:[
    [0,0.3,"oil","Saudi Arabia (trickle)"],
    [1,0.2,"oil","Iraq (trickle)"],
    [5,0.0,"block","Iran (BLOCKED)"],
  ],
  // pipelines → Cape (can't use Bab/Suez so must go around Africa)
  bypass2cape:[
    [3.5,"bypass","Yanbu Pipeline → loads at Red Sea port → Cape"],
    [1.5,"bypass","Fujairah Pipeline → Cape"],
  ],
  h2d:[
    [1,0.4,"oil","Hormuz trickle → India"],
  ],
  // Iraq overland to Turkey
  iraq2europe:[[0.8,"bypass","Iraq → Turkey pipeline → Europe"]],
  cape2d:[
    [0,1.4,"cape","Cape → China (+15 days)"],
    [2,0.8,"cape","Cape → Japan/S.Korea"],
    [3,1.2,"cape","Cape → Europe (+12 days)"],
    [4,0.5,"cape","Cape → USA"],
    [5,0.6,"cape","Cape → Other Asia"],
  ]
}
];

function buildSVG(mi) {
  const M = MODES[mi];
  const W = 660, H = 480;
  const lm = 12, rm = 12, tm = 38, bm = 16;
  const cW = 14; // node column width
  const gap = 8;

  // Column X centers
  const hasCol3 = !!M.col3label;
  const cx = hasCol3
    ? [90, 230, 370, 490, W-90]
    : [90, 255, 405, W-90, 0];

  const prodN = M.producers.length;
  const destN = M.dests.length;
  const drawH = H - tm - bm;

  // Compute node heights proportional to flow
  function nodeH(val, total, available) {
    return Math.max(4, (val/total)*available);
  }

  // --- Compute totals ---
  const prodOut = M.producers.map((_,i)=>{
    const p2h = (M.p2h||[]).filter(f=>f[0]===i).reduce((s,f)=>s+f[1],0);
    const b2c = (M.bypass2cape||[]).filter((_,j)=>j===i).reduce((s,f)=>s+f[0],0);
    return p2h || 0.1;
  });
  const prodTotal = prodOut.reduce((a,b)=>a+b,0);

  const destIn = M.dests.map((_,i)=>{
    const h2d = (M.h2d||[]).filter(f=>f[0]===i).reduce((s,f)=>s+f[1],0);
    const b2d = (M.b2d||[]).filter(f=>f[0]===i).reduce((s,f)=>s+f[1],0);
    const c2d = (M.cape2d||[]).filter(f=>f[0]===i).reduce((s,f)=>s+f[1],0);
    const i2e = i===3 ? (M.iraq2europe||[]).reduce((s,f)=>s+f[0],0) : 0;
    return h2d+b2d+c2d+i2e || 0.1;
  });
  const destTotal = destIn.reduce((a,b)=>a+b,0);

  // Node positions
  const prodGap = 7, destGap = 7;
  function colNodes(vals, total, colIdx, gap) {
    const available = drawH - gap*(vals.length-1);
    let y = tm;
    return vals.map((v,i)=>{
      const h = nodeH(v, total, available);
      const node = {x: cx[colIdx]-cW/2, y, h};
      y += h + gap;
      return node;
    });
  }

  const pNodes = colNodes(prodOut, prodTotal, 0, prodGap);

  // Hormuz node
  const h1total = (M.p2h||[]).reduce((s,f)=>s+f[1],0);
  const hAvail = drawH * 0.55;
  const hNode = {x: cx[1]-cW/2, y: tm + (drawH-hAvail)/2, h: hAvail};

  // Bab / col2 node
  const b2total = [...(M.h2b||[]), ...(M.bypass2b||[]), ...(M.bypass2cape||[])].reduce((s,f)=>s+f[0],0);
  const bAvail = drawH * 0.5;
  const bNode = {x: cx[2]-cW/2, y: tm + (drawH-bAvail)/2, h: bAvail};

  // Cape node (mode 2 only)
  const capeTotal = (M.bypass2cape||[]).reduce((s,f)=>s+f[0],0);
  const cAvail = drawH * 0.45;
  const cNode = {x: cx[3]-cW/2, y: tm + (drawH-cAvail)/2, h: cAvail};

  const dNodes = colNodes(destIn, destTotal, hasCol3?4:3, destGap);

  // Scale: pixels per mb/d
  const scale = Math.min(hAvail / (h1total||1), bAvail / (b2total||1)) * 0.82;

  // Track offsets for stacking flows on node edges
  const offs = {};
  function getOff(k, sz) {
    offs[k] = offs[k] || 0;
    const v = offs[k]; offs[k] += sz+1; return v;
  }

  let paths = [];
  let nodes_svg = [];
  let labels_svg = [];

  function bezierPath(x0,y0,x1,y1,thick,color,alpha,label,val,type) {
    if (thick < 1) return;
    const cp = (x0+x1)/2;
    const a = Math.min(0.85, alpha);
    const col = hexToRgba(color, a);
    paths.push(`<path d="M${x0},${y0} C${cp},${y0} ${cp},${y1} ${x1},${y1}" fill="none" stroke="${col}" stroke-width="${thick.toFixed(1)}" data-label="${label}" data-val="${val.toFixed(1)}" data-type="${type}"/>`);
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function drawFlow(x0node, y0node, h0node, x1node, y1node, h1node, val, type, label) {
    if (val < 0.015) return;
    const col = FLOW_COLORS[type] || "#888";
    const thick = Math.max(2, val * scale);
    const k0 = `${x0node.toFixed(0)},r`;
    const k1 = `${x1node.toFixed(0)},l`;
    const o0 = getOff(k0, thick);
    const o1 = getOff(k1, thick);
    const y0 = Math.min(y0node + o0 + thick/2, y0node + h0node - thick/2);
    const y1 = Math.min(y1node + o1 + thick/2, y1node + h1node - thick/2);
    const alpha = 0.4 + Math.min(val/15, 0.45);
    bezierPath(x0node + cW, y0, x1node, y1, thick, col, alpha, label, val, type);
  }

  // --- DRAW FLOWS ---

  // Producers → Hormuz
  (M.p2h||[]).forEach(([pi, val, type, label])=>{
    if (val < 0.015) return;
    drawFlow(pNodes[pi].x, pNodes[pi].y, pNodes[pi].h,
             hNode.x, hNode.y, hNode.h, val, type, label+" → Hormuz");
  });

  // Bypass → Bab (mode 1)
  (M.bypass2b||[]).forEach(([val, type, label])=>{
    drawFlow(pNodes[0].x, pNodes[0].y, pNodes[0].h,
             bNode.x, bNode.y, bNode.h, val, type, label);
  });

  // Hormuz → Bab
  (M.h2b||[]).forEach(([val, type, label])=>{
    drawFlow(hNode.x, hNode.y, hNode.h,
             bNode.x, bNode.y, bNode.h, val, type, label);
  });

  // Hormuz → Dest direct
  const dColIdx = hasCol3 ? 4 : 3;
  (M.h2d||[]).forEach(([di, val, type, label])=>{
    drawFlow(hNode.x, hNode.y, hNode.h,
             dNodes[di].x, dNodes[di].y, dNodes[di].h, val, type, label);
  });

  // Bab → Dest
  (M.b2d||[]).forEach(([di, val, type, label])=>{
    drawFlow(bNode.x, bNode.y, bNode.h,
             dNodes[di].x, dNodes[di].y, dNodes[di].h, val, type, label);
  });

  // Bypass → Cape (mode 2)
  (M.bypass2cape||[]).forEach(([val, type, label])=>{
    drawFlow(pNodes[0].x, pNodes[0].y, pNodes[0].h,
             cNode.x, cNode.y, cNode.h, val, type, label);
  });

  // Cape → Dest
  (M.cape2d||[]).forEach(([di, val, type, label])=>{
    drawFlow(cNode.x, cNode.y, cNode.h,
             dNodes[di].x, dNodes[di].y, dNodes[di].h, val, type, label);
  });

  // Iraq overland pipeline
  (M.iraq2europe||[]).forEach(([val, type, label])=>{
    drawFlow(pNodes[1].x, pNodes[1].y, pNodes[1].h,
             dNodes[3].x, dNodes[3].y, dNodes[3].h, val, type, label);
  });

  // --- DRAW NODES ---
  function drawNode(n, color, label, side, isBlocked) {
    const op = isBlocked ? "0.7" : "0.92";
    nodes_svg.push(`<rect x="${n.x}" y="${n.y.toFixed(1)}" width="${cW}" height="${n.h.toFixed(1)}" rx="3" fill="${color}" opacity="${op}"/>`);
    if (isBlocked) {
      const cx2 = n.x + cW/2, cy2 = n.y + n.h/2;
      const sz = Math.min(n.h/2-3, 8);
      nodes_svg.push(`<line x1="${cx2-sz}" y1="${cy2-sz}" x2="${cx2+sz}" y2="${cy2+sz}" stroke="#FF6666" stroke-width="2"/>`);
      nodes_svg.push(`<line x1="${cx2+sz}" y1="${cy2-sz}" x2="${cx2-sz}" y2="${cy2+sz}" stroke="#FF6666" stroke-width="2"/>`);
    }
    // Label
    const lcolor = isBlocked ? "#E24B4A" : "#666";
    const lx = side === "left" ? n.x - 5 : n.x + cW + 5;
    const anchor = side === "left" ? "end" : "start";
    const lines2 = label.split('\n');
    const lh2 = 12;
    const startY = n.y + n.h/2 - (lines2.length*lh2)/2 + lh2/2;
    lines2.forEach((ln,i)=>{
      labels_svg.push(`<text x="${lx}" y="${(startY+i*lh2).toFixed(1)}" text-anchor="${anchor}" dominant-baseline="central" font-size="10" fill="${lcolor}">${ln}</text>`);
    });
  }

  // Producer nodes
  M.producers.forEach((name,i)=>{
    const isIranBlocked = name==="Iran" && mi>0;
    const nd = pNodes[i];
    nodes_svg.push(`<rect x="${nd.x}" y="${nd.y.toFixed(1)}" width="${cW}" height="${nd.h.toFixed(1)}" rx="3" fill="#085041" opacity="${isIranBlocked?'0.2':'0.9'}"/>`);
    const lx = nd.x - 5;
    const cy2 = nd.y + nd.h/2;
    labels_svg.push(`<text x="${lx}" y="${cy2.toFixed(1)}" text-anchor="end" dominant-baseline="central" font-size="10" fill="${isIranBlocked?'#CC3333':'#555'}">${name}</text>`);
  });

  // Hormuz node
  const h1blocked = mi > 0;
  drawNode(hNode, h1blocked?"#7B0000":"#0F6E56", M.col1label, "right", h1blocked);

  // Bab node
  const babBlocked = mi === 2;
  drawNode(bNode, babBlocked?"#7B0000":"#0C447C", M.col2label, "right", babBlocked);

  // Cape node
  if (hasCol3) {
    drawNode(cNode, "#3C3489", M.col3label, "right", false);
  }

  // Destination nodes
  M.dests.forEach((name,i)=>{
    const nd = dNodes[i];
    nodes_svg.push(`<rect x="${nd.x}" y="${nd.y.toFixed(1)}" width="${cW}" height="${nd.h.toFixed(1)}" rx="3" fill="#0C447C" opacity="0.9"/>`);
    const lx = nd.x + cW + 5;
    const cy2 = nd.y + nd.h/2;
    labels_svg.push(`<text x="${lx}" y="${cy2.toFixed(1)}" text-anchor="start" dominant-baseline="central" font-size="10" fill="#555">${name}</text>`);
  });

  // Column headers
  const hdrColor = "#aaa";
  const hdrs = [
    [cx[0],"PRODUCERS"],
    [cx[1],"HORMUZ"],
    [cx[2],"BAB EL-MANDEB"],
    hasCol3 ? [cx[3],"CAPE ROUTE"] : null,
    [hasCol3?cx[4]:cx[3],"DESTINATIONS"],
  ].filter(Boolean);

  const hdrSVG = hdrs.map(([x,t])=>`<text x="${x}" y="${tm-8}" text-anchor="middle" font-size="9" font-weight="bold" fill="${hdrColor}">${t}</text>`).join('');

  const titleSVG = `<text x="${W/2}" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="${M.titleColor}">${M.title}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">
    ${titleSVG}
    ${hdrSVG}
    ${paths.join('\n')}
    ${nodes_svg.join('\n')}
    ${labels_svg.join('\n')}
  </svg>`;
}

function show(mi) {
  ["m0","m1","m2"].forEach((id,i)=>{
    const el = document.getElementById(id);
    el.className = "btn" + (i===mi?" active":"");
  });
  document.getElementById("wrap").innerHTML = buildSVG(mi);

  // Tooltip on SVG paths
  document.querySelectorAll("#wrap path").forEach(p=>{
    p.style.cursor = "pointer";
    p.addEventListener("mouseenter", function(e) {
      const label = this.dataset.label;
      const val = this.dataset.val;
      const type = this.dataset.type;
      const col = FLOW_COLORS[type]||"#888";
      const typeLabel = {oil:"crude oil",lng:"LNG",bypass:"pipeline bypass",cape:"Cape of Good Hope",block:"BLOCKED"}[type]||type;
      const tip = document.getElementById("flowtip");
      tip.innerHTML = `<b>${label}</b><br>${val} mb/d &nbsp;<span style="color:${col}">● ${typeLabel}</span>`;
      tip.style.display = "block";
    });
    p.addEventListener("mousemove", function(e) {
      const tip = document.getElementById("flowtip");
      tip.style.left = Math.min(e.clientX+14, window.innerWidth-260)+"px";
      tip.style.top = (e.clientY-44)+"px";
    });
    p.addEventListener("mouseleave", function() {
      document.getElementById("flowtip").style.display="none";
    });
  });
}

show(0);
</script>

<div id="flowtip" style="position:fixed;background:#fff;border:1px solid #ccc;border-radius:6px;padding:7px 11px;font-size:12px;pointer-events:none;display:none;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.18);color:#222;max-width:250px;line-height:1.6"></div>
